name: 💡 Feature Request
description: Suggest an idea or enhancement for Perforce Agentic Gateway.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: >-
        Thanks for sharing an idea. If you already have a paid Perforce product
        or support contract, you can also raise enhancement requests through
        [Perforce Support](https://portal.perforce.com/s/contactsupport).
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. What are you trying to accomplish?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the gateway to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
